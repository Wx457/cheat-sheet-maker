name: Backend Tests

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Run backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify dependency graph
        run: python -m pip check

      - name: Run ruff
        run: python -m ruff check app tests main.py

      - name: Run black check
        run: python -m black --check app tests main.py

      - name: Smoke import critical modules
        env:
          GOOGLE_API_KEY: "ci-placeholder"
          OPENAI_API_KEY: "ci-placeholder"
          MONGODB_URI: "mongodb://localhost:27017"
        run: python -c "from app.domain.utils.cleaner import clean_raw_text; from app.infrastructure.llm.retry_utils import run_with_exponential_backoff; from app.infrastructure.llm.openai_client import OpenAIClient; from app.infrastructure.llm.gemini_client import GeminiClient; print('smoke-import-ok')"

      - name: Run pytest
        env:
          PYTHONUTF8: "1"
        run: python -m pytest
