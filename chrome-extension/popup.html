<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    /* 全局样式：保持插件的小巧风格 */
    body {
      width: 420px; /* 稍微宽一点，容纳标签页 */
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #333;
      background-color: #fff;
      display: flex;
      flex-direction: column;
      height: 600px; /* 固定高度 */
    }

    h3 {
      margin: 0;
      padding: 16px;
      font-size: 18px;
      color: #0ABAB5; /* 蒂芙尼蓝 */
      text-align: center;
      border-bottom: 1px solid #e8eaed;
    }

    /* 主内容区域（可滚动） */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* 表单组通用样式 */
    .form-group {
      margin-bottom: 12px;
    }

    label.section-title {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 12px;
      color: #5f6368;
    }

    /* 文本输入框样式 */
    input[type="text"], textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: inherit;
      resize: none;
    }


    input[type="text"]:focus, textarea:focus {
      border-color: #0ABAB5;
      outline: none;
    }

    /* 单选按钮组容器 */
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 13px;
    }

    .radio-label input[type="radio"] {
      margin-right: 6px;
      cursor: pointer;
      width: 16px;
      height: 16px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      border: 2px solid #333; /* 未选中时黑色边框 */
      border-radius: 50%;
      background-color: transparent;
      position: relative;
      transition: border-color 0.2s;
    }

    .radio-label input[type="radio"]:checked {
      border-color: white; /* 选中时白色边框 */
      background-color: #0ABAB5; /* 蒂芙尼蓝背景 */
    }

    .radio-label input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: white; /* 内部白色圆点 */
    }

    /* 标签页样式 */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e8eaed;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background-color: #f8f9fa;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      font-weight: 500;
      color: #5f6368;
      transition: all 0.2s;
    }

    .tab:hover {
      background-color: #e8eaed;
    }

    .tab.active {
      background-color: #fff;
      color: #0ABAB5;
      border-bottom-color: #0ABAB5;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* 标签页内容 */
    .tab-content textarea {
      min-height: 120px;
      font-size: 13px;
    }

    .tab-content button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      background-color: rgba(10, 186, 181, 0.3); /* 蒂芙尼蓝 30% 透明度 */
      color: white;
      transition: background-color 0.2s, opacity 0.2s;
    }

    .tab-content button:hover {
      background-color: rgba(10, 186, 181, 1); /* 蒂芙尼蓝 100% 不透明 */
    }

    .tab-content button:disabled {
      background-color: #dadce0;
      color: #999;
      cursor: not-allowed;
    }

    /* 文件上传样式 */
    .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type="file"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 13px;
    }

    /* 底部固定栏 */
    .footer {
      border-top: 1px solid #e8eaed;
      padding: 12px 16px;
      background-color: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status-bar {
      font-size: 12px;
      color: #5f6368;
      min-height: 1.2em;
      text-align: center;
    }

    .status-bar.success {
      color: #065f46;
    }

    .status-bar.error {
      color: #991b1b;
    }

    .footer-button {
      width: 50%;
      padding: 12px;
      border: none;
      border-radius: 20px;
      align-self: center;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      background-color: rgba(10, 186, 181, 0.3); /* 蒂芙尼蓝 30% 透明度 */
      color: white;
      transition: background-color 0.2s, opacity 0.2s;
    }

    .footer-button:hover {
      background-color: rgba(10, 186, 181, 1); /* 蒂芙尼蓝 100% 不透明 */
    }

    .footer-button:disabled {
      background-color: #dadce0;
      color: #999;
      cursor: not-allowed;
    }

    /* 大纲视图样式 */
    #view-outline {
      display: none;
    }

    #view-outline h4 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
      color: #0ABAB5;
    }

    #outline-list {
      margin-bottom: 20px;
      max-height: 300px;
      overflow-y: auto;
    }

    .outline-item {
      display: flex;
      align-items: center;
      padding: 8px;
      margin-bottom: 8px;
      background-color: #f8f9fa;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .outline-item:hover {
      background-color: #e8eaed;
    }

    .outline-item input[type="checkbox"] {
      margin-right: 10px;
      cursor: pointer;
      width: 18px;
      height: 18px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      border: 2px solid #0ABAB5; /* 蒂芙尼蓝边框 */
      border-radius: 3px;
      background-color: transparent;
      position: relative;
      transition: none; /* 取消hover效果 */
    }

    .outline-item input[type="checkbox"]:checked {
      background-color: #0ABAB5; /* 选中时蒂芙尼蓝背景 */
      border-color: #0ABAB5;
    }

    .outline-item input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white; /* 白色勾选符号 */
      font-size: 14px;
      font-weight: bold;
      line-height: 1;
    }

    .outline-item input[type="checkbox"]:hover {
      /* 取消复选框本身的hover效果，保持颜色不变 */
    }

    .outline-item label {
      flex: 1;
      cursor: pointer;
      font-size: 13px;
      margin: 0;
    }
    
    .topic-custom-tag {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 6px;
      background-color: rgba(10, 186, 181, 0.15);
      color: #0ABAB5;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .custom-topic-group {
      margin-top: 16px;
      margin-bottom: 16px;
    }

    .custom-topic-group input:focus {
      border-color: #0ABAB5;
      outline: none;
    }

    /* 自定义主题"+"按钮hover效果：从30%透明度转为100% */
    #btnAddCustomTopic {
      background-color: rgba(10, 186, 181, 0.3) !important;
    }
    #btnAddCustomTopic:hover {
      background-color: rgba(10, 186, 181, 1) !important;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .secondary-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      background-color: #f1f3f4;
      color: #0ABAB5;
    }
    .secondary-btn:hover {
      background-color: #e8eaed;
    }

    .primary-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      background-color: rgba(10, 186, 181, 0.3); /* 蒂芙尼蓝 30% 透明度 */
      color: white;
      transition: background-color 0.2s, opacity 0.2s;
    }
    .primary-btn:hover {
      background-color: rgba(10, 186, 181, 1); /* 蒂芙尼蓝 100% 不透明 */
    }

    #resultArea {
      margin-top: 10px;
      text-align: center;
      padding: 8px;
      background-color: rgba(10, 186, 181, 0.15);
      border-radius: 4px;
    }
    #resultArea a {
      display: inline-block;
      padding: 10px 20px;
      background-color: #0ABAB5; /* 100%饱和的Tiffany蓝背景 */
      color: white; /* 白色文字 */
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      transition: opacity 0.2s;
    }
    #resultArea a:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <h3>Cheat Sheet Maker</h3>

  <!-- 表单视图 -->
  <div id="view-form">
    <div class="main-content">
      <!-- 基础信息 -->
      <div class="form-group">
        <label class="section-title" for="courseName">课程名称</label>
        <input type="text" id="courseName" placeholder="例如: Machine Learning CS229" />
      </div>

      <div class="form-group">
        <label class="section-title">学习层次</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="educationLevel" value="Undergraduate" checked> 本科
          </label>
          <label class="radio-label">
            <input type="radio" name="educationLevel" value="Graduate"> 研究生
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="section-title">考试类型</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="examType" value="Quiz"> Quiz
          </label>
          <label class="radio-label">
            <input type="radio" name="examType" value="Midterm"> Midterm
          </label>
          <label class="radio-label">
            <input type="radio" name="examType" value="Final" checked> Final
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="section-title">小抄页面限制</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="pageLimit" value="1 side"> 1 Side</label>
          <label class="radio-label"><input type="radio" name="pageLimit" value="1 page"> 1 Page</label>
          <label class="radio-label"><input type="radio" name="pageLimit" value="2 pages"> 2 Pages</label>
          <label class="radio-label"><input type="radio" name="pageLimit" value="Unlimited" checked> No Limit</label>
        </div>
      </div>

      <div class="form-group">
        <label class="section-title" for="syllabusInput">考试大纲(可选)</label>
        <textarea id="syllabusInput" rows="3" placeholder="在此粘贴考纲，AI 将优先提取相关内容..."></textarea>
      </div>

      <!-- 标签页 -->
      <div class="tabs">
        <button class="tab active" data-tab="current-page">扫描当前页面</button>
        <button class="tab" data-tab="paste-text">粘贴文本</button>
        <button class="tab" data-tab="upload-pdf">上传PDF</button>
      </div>

      <!-- 标签页内容：当前页面 -->
      <div id="tab-current-page" class="tab-content active">
        <button id="btnScanPage">扫描并添加到知识库</button>
      </div>

      <!-- 标签页内容：粘贴文本 -->
      <div id="tab-paste-text" class="tab-content">
        <div class="form-group">
          <label class="section-title" for="pasteTextInput">粘贴文本内容</label>
          <textarea id="pasteTextInput" rows="8" placeholder="在此粘贴文本内容..."></textarea>
        </div>
        <button id="btnSaveText">保存文本到知识库</button>
      </div>

      <!-- 标签页内容：上传PDF -->
      <div id="tab-upload-pdf" class="tab-content">
        <div class="form-group">
          <label class="section-title" for="pdfFileInput">选择PDF文件</label>
          <div class="file-input-wrapper">
            <input type="file" id="pdfFileInput" accept=".pdf" />
          </div>
        </div>
        <button id="btnUploadPdf">上传PDF到知识库</button>
      </div>
    </div>

    <!-- 底部固定栏 -->
    <div class="footer">
      <div id="statusBar" class="status-bar"></div>
      <button id="btnNextGenerate" class="footer-button">下一步：生成大纲</button>
    </div>
  </div>

  <!-- 大纲视图 -->
  <div id="view-outline">
    <div class="main-content">
      <h4>检测到的考试主题 (请勾选)</h4>
      <div id="outline-list"></div>
      
      <!-- 自定义主题输入 -->
      <div class="custom-topic-group">
        <div style="display: flex; gap: 8px;">
          <input 
            type="text" 
            id="customTopicInput" 
            placeholder="添加自定义主题..." 
            style="flex: 1; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box;"
          />
          <button 
            id="btnAddCustomTopic" 
            style="padding: 8px 16px; border: none; border-radius: 4px; background-color: rgba(10, 186, 181, 0.3); color: white; cursor: pointer; font-weight: 600; transition: background-color 0.2s;"
          >
            +
          </button>
        </div>
      </div>
      
      <div class="button-group">
        <button id="btnBack" class="secondary-btn">返回修改</button>
        <button id="btnConfirmGenerate" class="primary-btn">确认并生成</button>
      </div>
    </div>
  </div>

  <div id="resultArea" style="display:none; padding: 16px;">
    <a id="downloadLink" href="#" target="_blank">查看生成的 PDF</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
