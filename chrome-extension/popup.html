<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    /* 全局样式：保持插件的小巧风格 */
    body {
      width: 100%;
      min-width: 300px;
      max-width: 400px; /* Side Panel 通常宽度为 300-400px */
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #333;
      background-color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh; /* Side Panel 使用视口高度 */
    }

    .reset-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background-color: #ef4444;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
    }

    .reset-btn:hover {
      background-color: #dc2626;
    }

    .counter-bar {
      font-size: 12px;
      color: #0f172a;
      text-align: center;
      min-height: 1.2em;
    }

    h3 {
      margin: 0;
      padding: 16px;
      font-size: 18px;
      color: #0ABAB5; /* 蒂芙尼蓝 */
      text-align: center;
      border-bottom: 1px solid #e8eaed;
    }

    /* 主内容区域（可滚动） */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* 表单组通用样式 */
    .form-group {
      margin-bottom: 12px;
    }

    label.section-title {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 12px;
      color: #5f6368;
    }

    /* 文本输入框样式 */
    input[type="text"], textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: inherit;
      resize: none;
    }


    input[type="text"]:focus, textarea:focus {
      border-color: #0ABAB5;
      outline: none;
    }

    /* 单选按钮组容器 */
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 13px;
    }

    .radio-label input[type="radio"] {
      margin-right: 6px;
      cursor: pointer;
      width: 16px;
      height: 16px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      border: 2px solid #333; /* 未选中时黑色边框 */
      border-radius: 50%;
      background-color: transparent;
      position: relative;
      transition: border-color 0.2s;
    }

    .radio-label input[type="radio"]:checked {
      border-color: white; /* 选中时白色边框 */
      background-color: #0ABAB5; /* 蒂芙尼蓝背景 */
    }

    .radio-label input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: white; /* 内部白色圆点 */
    }

    /* 标签页样式 */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e8eaed;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background-color: #f8f9fa;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      font-weight: 500;
      color: #5f6368;
      transition: all 0.2s;
    }

    .tab:hover {
      background-color: #e8eaed;
    }

    .tab.active {
      background-color: #fff;
      color: #0ABAB5;
      border-bottom-color: #0ABAB5;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* 标签页内容 */
    .tab-content textarea {
      min-height: 120px;
      font-size: 13px;
    }

    .tab-content button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      background-color: rgba(10, 186, 181, 0.3);
      color: white;
      transition: background-color 0.2s, opacity 0.2s;
    }

    .tab-content button:hover {
      background-color: rgba(10, 186, 181, 1);
    }

    .tab-content button:disabled {
      background-color: #dadce0;
      color: #999;
      cursor: not-allowed;
    }

    /* 文件上传样式 */
    .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type="file"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 13px;
    }

    /* 底部固定栏（Sticky Footer） */
    .footer {
      border-top: 1px solid #e8eaed;
      padding: 10px 16px;
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      bottom: 0;
      z-index: 20;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #4b5563;
    }

    .footer-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .footer-button {
      padding: 10px 16px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      background-color: rgba(10, 186, 181, 0.3); 
      color: white;
      transition: background-color 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    
    .footer-button:hover {
      background-color: rgba(10, 186, 181, 1); /* 蒂芙尼蓝 100% 不透明 */
    }
    
    .footer-button.disabled {
      background-color: #dadce0;
      color: #9ca3af;
      cursor: not-allowed;
    }

    .footer-button.success {
      background-color: #16a34a;
    }

    .estimate-badge {
      font-size: 11px;
      color: #6b7280;
    }

    /* 大纲视图样式 */
    #view-outline {
      display: none;
    }

    #view-outline h4 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
      color: #0ABAB5;
    }

    #outline-list {
      margin-bottom: 20px;
      max-height: 300px;
      overflow-y: auto;
    }

    .outline-item {
      display: flex;
      align-items: center;
      padding: 8px;
      margin-bottom: 8px;
      background-color: #f8f9fa;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .outline-item:hover {
      background-color: #e8eaed;
    }

    .outline-item input[type="checkbox"] {
      margin-right: 10px;
      cursor: pointer;
      width: 18px;
      height: 18px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      border: 2px solid #0ABAB5; /* 蒂芙尼蓝边框 */
      border-radius: 3px;
      background-color: transparent;
      position: relative;
      transition: none; /* 取消hover效果 */
    }

    .outline-item input[type="checkbox"]:checked {
      background-color: #0ABAB5; /* 选中时蒂芙尼蓝背景 */
      border-color: #0ABAB5;
    }

    .outline-item input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white; /* 白色勾选符号 */
      font-size: 14px;
      font-weight: bold;
      line-height: 1;
    }

    .outline-item label {
      flex: 1;
      cursor: pointer;
      font-size: 13px;
      margin: 0;
    }
    
    .topic-custom-tag {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 6px;
      background-color: rgba(10, 186, 181, 0.15);
      color: #0ABAB5;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .custom-topic-group {
      margin-top: 16px;
      margin-bottom: 16px;
    }

    .custom-topic-group input:focus {
      border-color: #0ABAB5;
      outline: none;
    }

    /* 自定义主题"+"按钮hover效果：从30%透明度转为100% */
    #btnAddCustomTopic {
      background-color: rgba(10, 186, 181, 0.3) !important;
    }
    #btnAddCustomTopic:hover {
      background-color: rgba(10, 186, 181, 1) !important;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .secondary-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      background-color: #f1f3f4;
      color: #0ABAB5;
    }
    .secondary-btn:hover {
      background-color: #e8eaed;
    }

    .primary-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      background-color: rgba(10, 186, 181, 0.3);
      color: white;
      transition: background-color 0.2s, opacity 0.2s;
    }
    .primary-btn:hover {
      background-color: rgba(10, 186, 181, 1);
    }

    #resultArea {
      margin-top: 10px;
      text-align: center;
      padding: 12px 8px 14px 8px;
      background-color: rgba(10, 186, 181, 0.15);
      border-radius: 4px;
    }
    #resultArea a {
      display: inline-block;
      padding: 10px 20px;
      background-color: #0ABAB5;
      color: white; /* 白色文字 */
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      transition: opacity 0.2s;
      margin-bottom: 8px;
    }
    #resultArea a:hover {
      opacity: 0.9;
    }
    #btnBackHome {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      background-color: #f1f5f9;
      color: #0f172a;
      cursor: pointer;
    }
    #btnBackHome:hover {
      background-color: #e2e8f0;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      padding: 8px 12px 0 12px;
      gap: 8px;
    }

    .reset-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background-color: #ef4444;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
    }

    .reset-btn:hover {
      background-color: #dc2626;
    }

    .counter-bar {
      font-size: 12px;
      color: #0f172a;
      min-height: 1.2em;
    }

    /* Header Accordion */
    .header-accordion {
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      padding: 8px 10px 10px 10px;
      margin-bottom: 12px;
      background-color: #f9fafb;
      position: relative;
    }

    .header-summary {
      display: none;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
    }

    .header-summary-edit {
      display: none; /* 使用右上角独立按钮控制展开/收起，避免文案重复 */
    }

    .header-summary-main {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100% - 80px); /* 适配 Side Panel 窄屏，留出右侧按钮空间 */
    }

    .header-summary-edit {
      color: #0ABAB5;
      font-weight: 600;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .header-details {
      margin-top: 4px;
      max-height: 500px;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .header-details.collapsed {
      max-height: 0;
    }

    .header-accordion.collapsed .header-summary {
      display: flex;
    }

    .header-accordion.collapsed .header-details {
      margin-top: 0;
    }

    .header-toggle-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      border: none;
      background: transparent;
      color: #0ABAB5;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <h3>Cheat Sheet Maker</h3>

  <!-- 表单视图 -->
  <div id="view-form">
    <div class="main-content">
      <!-- 可折叠基础信息 Header -->
      <div class="header-accordion" id="headerAccordion">
        <button id="toggleHeaderBtn" class="header-toggle-btn" type="button">Collapse</button>
        <div class="header-summary" id="headerSummary">
          <div class="header-summary-main" id="headerSummaryMain">
            Course Name not filled · Final · Unlimited
          </div>
          <div class="header-summary-edit" id="headerSummaryEdit">Expand</div>
        </div>
        <div class="header-details" id="headerDetails">
          <div class="form-group">
            <label class="section-title" for="courseName">Course Name</label>
            <input type="text" id="courseName" placeholder="e.g. Machine Learning CS229" />
          </div>

          <div class="form-group">
            <label class="section-title">Education Level</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="educationLevel" value="Undergraduate" checked> Undergraduate
              </label>
              <label class="radio-label">
                <input type="radio" name="educationLevel" value="Graduate"> Graduate
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="section-title">Exam Type</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="examType" value="Quiz"> Quiz
              </label>
              <label class="radio-label">
                <input type="radio" name="examType" value="Midterm"> Midterm
              </label>
              <label class="radio-label">
                <input type="radio" name="examType" value="Final" checked> Final
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="section-title">Page Limit</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="pageLimit" value="1 side"> 1 Side</label>
              <label class="radio-label"><input type="radio" name="pageLimit" value="1 page"> 1 Page</label>
              <label class="radio-label"><input type="radio" name="pageLimit" value="2 pages"> 2 Pages</label>
              <label class="radio-label"><input type="radio" name="pageLimit" value="Unlimited" checked> No Limit</label>
            </div>
          </div>

          <div class="form-group">
            <label class="section-title" for="syllabusInput">Syllabus (Optional)</label>
            <textarea id="syllabusInput" rows="3" placeholder="Paste syllabus here, AI will prioritize extracting relevant content..."></textarea>
          </div>
        </div>
      </div>

      <!-- 标签页 -->
      <div class="tabs">
        <button class="tab active" data-tab="current-page">Scan</button>
        <button class="tab" data-tab="paste-text">Paste</button>
        <button class="tab" data-tab="upload-pdf">PDF</button>
      </div>

      <!-- 标签页内容：当前页面 -->
      <div id="tab-current-page" class="tab-content active">
        <p style="font-size: 12px; color: #6b7280; margin-bottom: 8px; line-height: 1.4;">
          <strong>GPT Chatbox ONLY!</strong> 
          Capture content to knowledge base.
          <span style="display: block; margin-top: 4px; color: #ef4444;">
            ⚠️ If page auto-scrolling doesn't work, please refresh the page and try again.
          </span>
        </p>
        <button id="btnScanPage">Scan &amp; Add to KB</button>
      </div>

      <!-- 标签页内容：粘贴文本 -->
      <div id="tab-paste-text" class="tab-content">
        <div class="form-group">
          <label class="section-title" for="pasteTextInput">Paste Text</label>
          <textarea id="pasteTextInput" rows="8" placeholder="Paste text content here..."></textarea>
        </div>
        <button id="btnSaveText">Save &amp; Add to KB</button>
      </div>

      <!-- 标签页内容：上传PDF -->
      <div id="tab-upload-pdf" class="tab-content">
        <div class="form-group">
          <label class="section-title" for="pdfFileInput">Select PDF File</label>
          <div class="file-input-wrapper">
            <input type="file" id="pdfFileInput" accept=".pdf" />
          </div>
        </div>
        <button id="btnUploadPdf">Upload PDF &amp; Add to KB</button>
      </div>
    </div>

    <!-- 底部固定栏 -->
    <div class="footer">
      <div class="footer-left">
        <button id="btnReset" class="reset-btn" title="Clear the knowledge base for the current user">🗑 Clear</button>
        <div id="chunkCounter" class="counter-bar">📚 0 Chunks</div>
      </div>
      <div class="footer-right">
        <button id="btnNextGenerate" class="footer-button">Next: Generate Outline</button>
        <div id="estimateLabel" class="estimate-badge"></div>
      </div>
    </div>
  </div>

  <!-- 大纲视图 -->
  <div id="view-outline">
    <div class="main-content">
      <h4>Detected Exam Topics (Please Check)</h4>
      <div id="outline-list"></div>
      
      <!-- 自定义主题输入 -->
      <div class="custom-topic-group">
        <div style="display: flex; gap: 8px;">
          <input 
            type="text" 
            id="customTopicInput" 
            placeholder="Add topic..." 
            style="flex: 1; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box;"
          />
          <button 
            id="btnAddCustomTopic" 
            style="padding: 8px 16px; border: none; border-radius: 4px; background-color: rgba(10, 186, 181, 0.3); color: white; cursor: pointer; font-weight: 600; transition: background-color 0.2s;"
          >
            +
          </button>
        </div>
      </div>
      
      <div class="button-group">
        <button id="btnBack" class="secondary-btn">Back</button>
        <button id="btnConfirmGenerate" class="primary-btn">Submit</button>
      </div>
      <div id="outlineEstimateLabel" class="estimate-badge" style="text-align: right; margin-top: 6px;"></div>
    </div>
  </div>

  <div id="resultArea" style="display:none; padding: 16px;">
    <a id="downloadLink" href="#" target="_blank">Download PDF</a>
    <div style="margin-top: 4px;">
      <button id="btnBackHome" type="button">Back to Home</button>
    </div>
  </div>

  <script src="formPersistence.js"></script>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
