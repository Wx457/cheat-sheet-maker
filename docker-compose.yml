version: '3.8'

services:
  # 1. Redis 服务 (必须保留，用于消息队列)
  redis:
    image: redis:alpine
    container_name: cheat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # 2. FastAPI 后端
  backend:
    build: 
      context: ./backend
    container_name: cheat-backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    # Redis 配置
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1  # 👈 加上这行！强制立即打印日志
    # AWS 的配置：Docker 会自动读取这个文件里的 AWS_ACCESS_KEY 等变量
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - app_network

  # 3. ARQ Worker (消费者)
  worker:
    build: 
      context: ./backend
    container_name: cheat-worker
    command: arq app.worker.WorkerSettings --watch app
    volumes:
      - ./backend:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1  # 👈 加上这行！强制立即打印日志
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - app_network

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge