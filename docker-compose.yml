version: '3.8'

services:
  # 1. Redis
  redis:
    image: redis:alpine
    container_name: cheat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  # 2. FastAPI backend
  backend:
    init: true
    build: 
      context: ./backend
    container_name: cheat-backend
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PDF_GENERATION_HOST=http://backend:8000
      - PYTHONDONTWRITEBYTECODE=1
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,sys,urllib.request; u='http://127.0.0.1:8000/health'; r=urllib.request.urlopen(u, timeout=5); body=json.loads(r.read().decode()); sys.exit(0 if body.get('status')=='ok' else 1)\""]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  # 3. ARQ Worker (consumer)
  worker:
    init: true
    build: 
      context: ./backend
    container_name: cheat-worker
    restart: unless-stopped
    command: arq app.worker.WorkerSettings
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PDF_GENERATION_HOST=http://backend:8000
      - PYTHONDONTWRITEBYTECODE=1
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,sys,socket; s=socket.socket(); s.settimeout(3); s.connect((os.getenv('REDIS_HOST','redis'), int(os.getenv('REDIS_PORT','6379')))); s.close(); sys.exit(0)\""]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    networks:
      - app_network

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge
